<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StateKeep</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="head">
      <h1>StateKeep</h1>
      <a id="open-dashboard" href="#" title="Open dashboard">⛶</a>
    </header>

    <section class="site">
      <div class="toggle-row">
        <label class="toggle">
          <input id="enabled" type="checkbox" />
          <span>Enable on <b id="host">this site</b></span>
        </label>
      </div>
      <div class="toggle-row" id="autosave-row" hidden>
        <label class="toggle">
          <input id="autosave" type="checkbox" />
          <span>Auto-save forms here</span>
        </label>
      </div>
    </section>

    <section class="save">
      <input id="name" type="text" placeholder="Name this snapshot (optional)" />
      <button id="save" class="primary">Save this page</button>
      <p id="status" class="status" hidden></p>
    </section>

    <section class="list">
      <h2>Recent snapshots</h2>
      <ul id="snapshots"></ul>
      <p id="empty" class="muted" hidden>No snapshots yet.</p>
    </section>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
